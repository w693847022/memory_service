[pytest]
# pytest 配置文件

# 测试发现
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = test/e2e test/integration test/unit

# 最小 Python 版本
minversion = 7.0

# 命令行选项
addopts =
    # 详细输出
    -v
    # 显示本地变量
    --showlocals
    # 显示测试覆盖
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    # 注意: 不默认添加标记过滤器，运行全量测试
    # 如需只运行特定测试，请使用命令行参数:
    #   -m e2e          只运行端到端测试
    #   -m "not e2e"    只运行非端到端测试
    #   -m mcp          只运行 MCP 测试

# 自定义标记
markers =
    mcp: MCP Server 端到端测试
    rest: REST API 端到端测试
    business: Business API 直接测试
    slow: 标记慢速测试
    e2e: 端到端测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 日志文件输出（每次运行覆盖同一文件）
log_file = logs/test.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] [%(name)s] %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# 警告设置
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 覆盖率配置
[coverage:run]
source = src
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = htmlcov
