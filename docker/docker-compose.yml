name: memory-system
services:
  # ===================
  # Business Server (业务逻辑核心)
  # ===================
  business-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.business
    container_name: business-server
    restart: unless-stopped
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "${BUSINESS_PORT:-8002}:8002"
    # CPU: 1.0 = 100000 / 100000
    cpu_quota: 100000
    cpu_period: 100000
    mem_limit: 1g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - PYTHONUNBUFFERED=1
      - MCP_STORAGE_DIR=${MCP_STORAGE_DIR:-/app/.project_memory_ai}
      - BUSINESS_LOG_LEVEL=${BUSINESS_LOG_LEVEL:-INFO}
      - LOG_DIR=/app/logs
      - LOG_MAX_BYTES=${LOG_MAX_BYTES:-10485760}
      - LOG_BACKUP_COUNT=${LOG_BACKUP_COUNT:-5}
    volumes:
      # 挂载项目记忆数据目录（持久化）
      - ${MCP_DATA_HOST_PATH:-~/.project_memory_ai}:/app/.project_memory_ai
      # 挂载日志目录（持久化）
      - ${LOG_HOST_PATH:-~/.project_memory_ai/logs}:/app/logs
      # 挂载源代码（开发模式热更新）
      - ../src:/app/src:ro
      # 挂载启动脚本
      - ../scripts/start_business.py:/app/start_business.py:ro
    networks:
      - mcp-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8002/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.mcp-memory.description=Business Logic Server"
      - "com.mcp-memory.version=1.0.0"

  # ===================
  # MCP Server (AI 工具接口)
  # ===================
  mcp-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mcp
    container_name: mcp-server
    restart: unless-stopped
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "${MCP_PORT:-8000}:8000"
    # CPU: 0.2 = 20000 / 100000
    cpu_quota: 20000
    cpu_period: 100000
    mem_limit: 200m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - HOME=${HOME:-/home/wrs}
      - MCP_TRANSPORT=${MCP_TRANSPORT:-streamable-http}
      - MCP_HOST=${MCP_HOST:-0.0.0.0}
      - MCP_PORT=${MCP_PORT:-8000}
      - MCP_LOG_LEVEL=${MCP_LOG_LEVEL:-INFO}
      - MCP_STORAGE_DIR=${MCP_STORAGE_DIR:-/app/.project_memory_ai}
      - BUSINESS_API_URL=${BUSINESS_API_URL:-http://business-server:8002}
      - LOG_DIR=/app/logs
      - LOG_MAX_BYTES=${LOG_MAX_BYTES:-10485760}
      - LOG_BACKUP_COUNT=${LOG_BACKUP_COUNT:-5}
    volumes:
      # 挂载项目记忆数据目录（持久化）
      - ${MCP_DATA_HOST_PATH:-~/.project_memory_ai}:/app/.project_memory_ai
      # 挂载日志目录（持久化）
      - ${LOG_HOST_PATH:-~/.project_memory_ai/logs}:/app/logs
      # 挂载源代码（开发模式热更新）
      - ../src:/app/src:ro
      - ../scripts/start_mcp.py:/app/start_mcp.py:ro
    networks:
      - mcp-network
    depends_on:
      - business-server
    labels:
      - "com.mcp-memory.description=MCP Adapter Server"
      - "com.mcp-memory.version=1.0.0"

  # ===================
  # FastAPI Server (Web 管理接口)
  # ===================
  fastapi-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fastapi
    container_name: fastapi-server
    restart: unless-stopped
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    ports:
      - "${FASTAPI_PORT:-8001}:8001"
    # CPU: 0.2 = 20000 / 100000
    cpu_quota: 20000
    cpu_period: 100000
    mem_limit: 200m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - PYTHONUNBUFFERED=1
      # HTTP 调用 business 层
      - MCP_STORAGE_DIR=${MCP_STORAGE_DIR:-/app/.project_memory_ai}
      - BUSINESS_API_URL=${BUSINESS_API_URL:-http://business-server:8002}
      # 日志配置
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_DIR=/app/logs/fastapi
      - LOG_MAX_BYTES=${LOG_MAX_BYTES:-10485760}
      - LOG_BACKUP_COUNT=${LOG_BACKUP_COUNT:-5}
    volumes:
      # 共享数据卷 - 访问共享的数据
      - ${MCP_DATA_HOST_PATH:-~/.project_memory_ai}:/app/.project_memory_ai
      # 挂载日志目录（持久化）
      - ${LOG_HOST_PATH:-~/.project_memory_ai/logs}:/app/logs
      # 挂载源代码（开发模式热更新）
      - ../src:/app/src:ro
      # 挂载启动脚本
      - ../scripts/start_fastapi.py:/app/start_fastapi.py:ro
    networks:
      - mcp-network
    depends_on:
      - business-server
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.mcp-memory.description=FastAPI REST API Server"
      - "com.mcp-memory.version=1.0.0"

networks:
  mcp-network:
    driver: bridge
    name: mcp-memory-network
